baseURL = 'https://clarenced.github.io/'
languageCode = 'en-us'
title = 'Clarence Charles'
theme = 'typo'

[taxonomies]
tag = 'tags'

# Google analytics code
#googleAnalytics = "G-xxxxxxxxx"

[params]
# Meta description
description = "A Tech Blog"

# Appearance settings
theme = 'auto'
colorPalette = 'default'
hideHeader = false

# Intro on main page, content is markdown
homeIntroTitle = 'Hello there! 👋'
homeIntroContent = """
Hello, I'm Clarence, a software engineer with a decade of experience. 
My main focus is backend development with Java and Spring Boot, although I have also worked on various frontend projects in the past. 

I am passionate about software craftsmanship, constantly striving to improve code quality and best practices.What I love about my job is the opportunity to work on exciting projects, collaborate with amazing colleagues, and share my experiences. 

Welcome to my blog!
"""

# Collection to display on home
homeCollectionTitle = 'Posts'
homeCollection = 'posts'

# Lists parameters
paginationSize = 100
listSummaries = true
listDateFormat = '2 Jan 2006'

# Breadcrumbs
breadcrumbs = true

# Social icons
[[params.social]]
name = "linkedin"
url = "https://www.linkedin.com/in/user/charlesdimitri/"

[[params.social]]
#name = "medium"
#url = "https://medium.com/@user"

[[params.social]]
name = "github"
url = "https://github.com/clarenced"

# Main menu pages
[[params.menu]]
name = "home"
url = "/"

[[params.menu]]
name = "posts"
url = "/posts"

[[params.menu]]
name = "about"
url = "/about"

# Syntax highligth on code blocks
[markup]
[markup.highlight]
style = 'algol'

